services:
  app:
    build:
      context: .
      target: production
    image: pin-proyecto1-app:latest
    container_name: pin-proyecto1-app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: ${APP_NAME:-PIN Proyecto 1}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
