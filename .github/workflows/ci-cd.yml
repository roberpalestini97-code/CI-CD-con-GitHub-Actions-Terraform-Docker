name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Permisos mínimos por defecto; cada job amplía lo que necesita.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) Calidad: ESLint + tests nativos (node --test)
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ---------------------------------------------------------------------------
  # 2) SonarQube: análisis estático de calidad
  #    Secrets requeridos: SONAR_TOKEN, SONAR_HOST_URL
  #    (sirve igual para SonarQube Server self-hosted o SonarQube Cloud)
  # ---------------------------------------------------------------------------
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar necesita el historial completo para el blame / nuevo código.
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ---------------------------------------------------------------------------
  # 3) Snyk: análisis de seguridad de dependencias
  #    Secret requerido: SNYK_TOKEN
  # ---------------------------------------------------------------------------
  security:
    name: Snyk
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Snyk test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ---------------------------------------------------------------------------
  # 4) Docker: build + push de la imagen de producción
  #    Solo en push (no en PRs). Sube a GHCR usando el GITHUB_TOKEN.
  #    Para Docker Hub: cambiar el login (registry/username/password con
  #    secrets DOCKERHUB_USERNAME y DOCKERHUB_TOKEN) y `images` del metadata.
  # ---------------------------------------------------------------------------
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [test, sonarqube, security]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action pasa el nombre a minúsculas (GHCR lo exige).
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SBOM + provenance como attestations adjuntas a la imagen en GHCR.
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SBOM como archivo descargable (CycloneDX) subido como artifact del workflow.
      # Escanea la imagen ya pusheada (la primera tag generada por metadata-action,
      # ya en minúsculas). El login a GHCR previo le da acceso para hacer el pull.
      - name: Generar SBOM (CycloneDX) de la imagen
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json
