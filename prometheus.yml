global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Monitoreo del propio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métricas de los contenedores Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Métricas del servidor / infraestructura
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # Métricas de la app
  # Reemplaza 'app' por el nombre del contenedor de tu aplicación
  - job_name: 'app'
    static_configs:
      - targets: ['app:8000']